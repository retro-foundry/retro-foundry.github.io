# Jekyll config for retro-foundry.github.io
title: Retro Foundry
description: A Jekyll blog on GitHub Pages
baseurl: ""
url: "https://retro-foundry.github.io"

# Build
markdown: kramdown
highlighter: rouge

# Plugins (bundled with github-pages gem)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
